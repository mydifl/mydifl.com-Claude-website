<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIFL — Redirecting...</title>
  <meta name="robots" content="noindex">
  <script>
    (function(){
      var path = window.location.pathname;
      var known = ['learn-french','learn-japanese','learn-german','learn-spanish',
        'learn-mandarin-chinese','learn-arabic','learn-korean-language',
        'learn-italian-language','learn-russian-language','learn-english',
        'learn-thai-language','learn-hindi-language','about-us',
        'learn-foreign-languages','handwriting-improvement','learn-calligraphy',
        'blog-on-foreign-languages','contact','foreign-language-faqs',
        'study-abroad-programs'];
      var segments = path.split('/').filter(Boolean);
      var sitePath = path;
      // Strip repo prefix (GitHub Pages subdomain)
      if(segments.length >= 2 && known.indexOf(segments[0]) === -1){
        sitePath = '/' + segments.slice(1).join('/');
        if(!sitePath.endsWith('/')) sitePath += '/';
      }
      // Store in sessionStorage and redirect to root
      try{ sessionStorage.setItem('difl_redirect', sitePath); }catch(e){}
      window.location.replace(window.location.origin +
        (path.indexOf('/mydifl.com-Claude-website') === 0 ?
          '/mydifl.com-Claude-website/' : '/'));
    })();
  </script>
</head>
<body></body>
</html>
