<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIFL — Redirecting...</title>
  <meta name="robots" content="noindex">
  <script>
    // ══════════════════════════════════════════════════════════════
    // GitHub Pages SPA 404 Redirect — DIFL Website
    // GitHub Pages serves this file for any URL it can't find.
    // We capture the full path and redirect to index.html with
    // the original path encoded as ?p= query parameter.
    // index.html reads it and navigates to the correct SPA page.
    // ══════════════════════════════════════════════════════════════
    (function(){
      var l = window.location;
      // Build redirect: always go to site root with ?p=originalPath
      // Works for both custom domain (mydifl.com) and GH Pages subdomain
      var origin = l.origin;
      // Find the root of the site (handles /repo-name/ prefix on GH Pages)
      // We use the path to index.html which is always at / or /repo-name/
      // Since 404.html is in the root of the repo, l.pathname for 
      // /learn-japanese/ becomes /mydifl.com-Claude-website/learn-japanese/
      // We want to redirect to /mydifl.com-Claude-website/?p=/learn-japanese/
      var fullPath = l.pathname;

      // Detect repo prefix: if path has 2+ segments and doesn't start 
      // with a known DIFL path, the first segment is the repo name
      var segments = fullPath.split('/').filter(Boolean); // ['mydifl.com-Claude-website','learn-japanese']
      var knownPaths = ['learn-french','learn-japanese','learn-german','learn-spanish',
        'learn-mandarin-chinese','learn-arabic','learn-korean-language','learn-italian-language',
        'learn-russian-language','learn-english','learn-thai-language','learn-hindi-language',
        'about-us','learn-foreign-languages','handwriting-improvement','learn-calligraphy',
        'blog-on-foreign-languages','contact','foreign-language-faqs','study-abroad-programs'];
      
      var repoPrefix = '';
      var sitePath = fullPath;
      
      if(segments.length >= 2 && knownPaths.indexOf(segments[0]) === -1) {
        // First segment is repo name, not a known page
        repoPrefix = '/' + segments[0];
        sitePath = '/' + segments.slice(1).join('/');
        if(sitePath !== '/') sitePath = sitePath.replace(/\/?$/, '/');
      }
      
      // Redirect to index.html with original site path as ?p= param
      var redirectTo = origin + repoPrefix + '/?p=' + encodeURIComponent(sitePath);
      l.replace(redirectTo);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/">
  </noscript>
</head>
<body>
  <p style="font-family:sans-serif;color:#666;text-align:center;margin-top:80px;font-size:14px">
    Redirecting to DIFL website...
  </p>
</body>
</html>
